<!-- CONTACT PAGE -->
<section class="contact-page">
  <div class="contact-box">

    <div class="contact-left">
      <h1>Contact-With-Us</h1>
      <p>I’d like to hear from you!</p>

      <p>
        If you have any inquiries or just want to say hi,
        please use the contact form.
      </p>

      <p class="email">✉  DreamDestination@gmail.com</p>

      <div class="socials">
        <span><img src="https://img.freepik.com/premium-psd/facebook-logo-blue-circle_705838-12823.jpg?semt=ais_hybrid&w=740&q=80" width="50px"><span>

      </div>
    </div>

    <div class="contact-right">
      <form>
        <div class="row">
          <input type="text" placeholder="First Name">
          <input type="text" placeholder="Last Name">
        </div>

        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
