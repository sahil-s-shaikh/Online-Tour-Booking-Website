<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Bootstrap/bootsTrap.css">
    <link rel="stylesheet" href="./registration.css">
    <link rel="stylesheet" href="../navbar/navbar.css">
</head>
<body style="background-image: url('https://team.kanakinfosystems.com/apps/assets/18.0/auto_backup_gdrive?imagepath=etc/1-background.jpg');">
 
    <main class="page-bg">
        <section class="container vh-100 justify-content-center align-content-center" >
            <form class=" row py-4">

<aside class="col-12 col-md-6" >
    <label for="name">Name</label>
    <input type="text" placeholder="Enter Your Name" name="name" required="">
</aside>

<aside class="col-12 col-md-6" >
    <label for="email">Email</label>
    <input type="email" placeholder="Enter Your Email" name="email" required>
</aside>

<aside class="col-12 col-md-6" >
    <label for="password">password</label>
    <input type="password" name="password"  placeholder="Enter the password" required>
</aside>

<aside class="col-12 col-md-6">
    <label for="contact">contact</label>
    <input type="tel" name="contact"  placeholder="Enter Your Contact">
</aside>

<aside class="col-12 col-md-6">
<label for="gender">Gender</label>
<input type="radio" name="gender" id="gender-male" value="Male">Male
<input type="radio" name="gender" id="gender-female" value="Female">Female
<input type="radio" name="gender" id="gender-other" value="Other">Other
</aside>

<aside class="col-12 col-md-6">
    <label for="dob">Date Of Birth</label>
    <input type="date" name="dob" >
</aside>

<aside class="col-12">
    <label for="address">Address</label>
    <textarea name="address" ></textarea>
</aside>

<aside  class="col-12 text-center">
    <button type="submit">Submit</button>
</aside>

<aside  class="col-12 text-center">
   <a href="../login/login.html">I have Account</a>
</aside>

            </form>
        </section>
    </main>
 
    <script src="../Bootstrap/bootsTrap.js"></script>
    <script src="./registration.js"></script>
    <script src="../navbar/navabr.js"></script>
</body>
</html>
